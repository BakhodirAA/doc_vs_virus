<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🩺 Доктор vs Микробы</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; overflow:hidden; font-family:'Courier New', monospace; touch-action:none; }
  canvas { display:block; cursor:none; }

  /* ── HUD ── */
  #hud { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }

  #score-box {
    position:fixed; top:14px; left:14px;
    background:rgba(0,20,40,0.75); border:1px solid #00ffcc;
    border-radius:8px; padding:6px 14px;
    color:#00ffcc; font-size:16px; font-weight:700;
    text-shadow:0 0 8px #00ffcc;
    letter-spacing:1px;
  }
  #health-box {
    position:fixed; top:14px; right:14px;
    background:rgba(40,0,0,0.75); border:1px solid #ff3355;
    border-radius:8px; padding:6px 14px;
    color:#ff3355; font-size:16px; font-weight:700;
    text-shadow:0 0 8px #ff3355;
  }
  #wave-box {
    position:fixed; top:58px; left:14px;
    color:#ffdd00; font-size:13px; font-weight:700;
    text-shadow:0 0 6px #ffdd00; letter-spacing:2px;
  }
  #author-box {
    position:fixed; top:58px; right:14px;
    color:#00ffcc; font-size:13px; font-weight:700;
    text-shadow:0 0 6px #00ffcc; letter-spacing:2px;
  }
  #ammo-box {
    position:fixed; bottom:160px; right:20px;
    color:#00ccff; font-size:13px; text-align:center;
    text-shadow:0 0 6px #00ccff;
  }

  /* crosshair */
  #crosshair {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:24px; height:24px; pointer-events:none;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.7);
  }
  #crosshair::before { width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
  #crosshair::after  { width:100%; height:2px; top:50%; left:0; transform:translateY(-50%); }

  /* ── JOYSTICK ── */
  #joystick-zone {
    position:fixed; bottom:20px; left:20px;
    width:130px; height:130px; pointer-events:auto;
  }
  #jbase {
    width:130px; height:130px; border-radius:50%;
    background:rgba(0,200,255,0.08);
    border:2px solid rgba(0,200,255,0.3);
  }
  #jknob {
    width:52px; height:52px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,255,220,0.6), rgba(0,150,180,0.3));
    border:2px solid rgba(0,255,220,0.8);
    position:absolute; top:39px; left:39px;
    box-shadow:0 0 12px rgba(0,255,220,0.5);
    transition:none;
  }

  /* ── FIRE BUTTON ── */
  #fire-btn {
    position:fixed; bottom:24px; right:24px;
    width:88px; height:88px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,60,60,0.8), rgba(180,0,0,0.6));
    border:3px solid rgba(255,100,80,0.9);
    box-shadow:0 0 20px rgba(255,0,0,0.4);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700;
    letter-spacing:1px; pointer-events:auto;
    user-select:none;
  }
  #fire-btn span { font-size:24px; line-height:1; }

  /* ── DAMAGE FLASH ── */
  #damage-flash {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(255,0,0,0); pointer-events:none;
    transition:background 0.08s;
  }

  /* ── WAVE ANNOUNCE ── */
  #wave-announce {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#ffdd00; font-size:36px; font-weight:900;
    text-shadow:0 0 20px #ffdd00, 0 0 40px #ff8800;
    letter-spacing:4px; pointer-events:none;
    opacity:0; transition:opacity 0.3s;
    text-align:center;
  }

  /* ── SCREENS ── */
  .fullscreen {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; z-index:100;
  }
  #start-screen {
    background:linear-gradient(160deg, #000d1a 0%, #001a33 50%, #000a14 100%);
  }
  #start-screen h1 {
    font-size:clamp(28px, 8vw, 46px);
    color:#00ffcc; font-weight:900; letter-spacing:4px;
    text-shadow:0 0 20px #00ffcc, 0 0 40px #00aa88;
    margin-bottom:6px;
  }
  #start-screen .subtitle {
    font-size:clamp(12px,4vw,18px); color:#007799;
    letter-spacing:2px; margin-bottom:20px;
  }
  .emoji-row { font-size:52px; margin:10px 0 20px; }
  .hint { font-size:13px; color:#337799; margin:4px 0; letter-spacing:1px; }
  .hint strong { color:#00ccaa; }

  .play-btn {
    margin-top:24px;
    background:linear-gradient(135deg, #00ffcc, #0077ff);
    color:#000; border:none; border-radius:12px;
    padding:14px 44px; font-size:18px; font-weight:900;
    letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 24px rgba(0,255,200,0.4);
    pointer-events:auto;
  }
  .play-btn:active { transform:scale(0.96); }

  #gameover-screen {
    background:rgba(0,0,0,0.92); display:none;
  }
  #gameover-screen h2 {
    font-size:clamp(28px,8vw,48px); color:#ff2244;
    font-weight:900; letter-spacing:3px;
    text-shadow:0 0 20px #ff0000;
    margin-bottom:10px;
  }
  #final-score {
    font-size:clamp(20px,6vw,32px); color:#ffdd00;
    text-shadow:0 0 12px #ffaa00; margin:8px 0 4px;
  }
  #final-wave {
    font-size:16px; color:#7799bb; margin-bottom:20px; letter-spacing:2px;
  }
  .restart-btn {
    background:linear-gradient(135deg, #ff2244, #cc0022);
    color:#fff; border:none; border-radius:12px;
    padding:14px 40px; font-size:16px; font-weight:900;
    letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,0,40,0.4);
    pointer-events:auto; margin-top:10px;
  }
  .restart-btn:active { transform:scale(0.96); }
</style>
</head>
<body>

<!-- START -->
<div id="start-screen" class="fullscreen">
  <h1>🩺 ДОКТОР<br>VS МИКРОБЫ</h1>
  <div class="subtitle">БИОЛАБОРАТОРИЯ / УРОВЕНЬ 1</div>
  <div class="emoji-row">🦠🔬🧫</div>
  <div class="hint"><strong>Джойстик</strong> — движение</div>
  <div class="hint"><strong>Свайп справа</strong> — прицел</div>
  <div class="hint"><strong>ОГОНЬ</strong> — уничтожить патогены</div>
  <button class="play-btn" id="start-btn">▶ ИГРАТЬ</button>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="fullscreen">
  <h2>☠ ЗАРАЖЕНИЕ</h2>
  <div id="final-score">СЧЁТ: 0</div>
  <div id="final-wave">ВОЛНА: 1</div>
  <button class="restart-btn" id="restart-btn">🔄 СНОВА</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score-box">СЧЁТ: <span id="score-val">0</span></div>
  <div id="health-box">❤️ <span id="hp-val">3</span></div>
  <div id="wave-box">ВОЛНА <span id="wave-val">1</span></div>
  <div id="crosshair"></div>
  <div id="wave-announce" id="wave-announce"></div>
</div>
<div id="damage-flash"></div>

<!-- JOYSTICK -->
<div id="joystick-zone">
  <div id="jbase"></div>
  <div id="jknob"></div>
</div>

<!-- FIRE -->
<div id="fire-btn"><span>💉</span>ОГОНЬ</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API — no files)
// ═══════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let musicGain  = null;
let musicRunning = false;
let ambientNodes = [];
let ambientSeqTimer = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.72;
  masterGain.connect(audioCtx.destination);
}

/* ── noise buffer helper ── */
function noiseBuffer(sec) {
  const sr = audioCtx.sampleRate;
  const n  = Math.ceil(sr * sec);
  const b  = audioCtx.createBuffer(1, n, sr);
  const d  = b.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return b;
}

/* ── SFX: SHOOT  (descending plasma zap) ── */
function sndShoot() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Main zap tone
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.38, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.20);
  g.connect(masterGain);
  const o = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(1600, now);
  o.frequency.exponentialRampToValueAtTime(180, now + 0.18);
  o.connect(g); o.start(now); o.stop(now + 0.20);

  // High crackle
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.15, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
  g2.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer(0.07);
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 4000;
  src.connect(hpf); hpf.connect(g2); src.start(now);
}

/* ── SFX: HIT  (wet splat) ── */
function sndHit() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.28, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
  g.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer(0.13);
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 3;
  src.connect(f); f.connect(g); src.start(now);
}

/* ── SFX: KILL  (pop + gooey drop) ── */
function sndKill() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Noise burst
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.5, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
  gn.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer(0.28);
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.setValueAtTime(4000, now);
  lpf.frequency.exponentialRampToValueAtTime(80, now + 0.28);
  src.connect(lpf); lpf.connect(gn); src.start(now);

  // Descending blop
  const go = audioCtx.createGain();
  go.gain.setValueAtTime(0.22, now);
  go.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
  go.connect(masterGain);
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(520, now);
  o.frequency.exponentialRampToValueAtTime(55, now + 0.22);
  o.connect(go); o.start(now); o.stop(now + 0.22);
}

/* ── SFX: DAMAGE  (harsh alarm buzz) ── */
function sndDamage() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.65, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
  g.connect(masterGain);

  const o = audioCtx.createOscillator();
  o.type = 'square';
  o.frequency.setValueAtTime(240, now);
  o.frequency.setValueAtTime(190, now + 0.12);
  o.frequency.setValueAtTime(240, now + 0.24);
  o.frequency.setValueAtTime(190, now + 0.36);
  o.connect(g); o.start(now); o.stop(now + 0.46);

  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.35, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  gn.connect(masterGain);
  const ns = audioCtx.createBufferSource();
  ns.buffer = noiseBuffer(0.35);
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass'; bpf.frequency.value = 300; bpf.Q.value = 1.5;
  ns.connect(bpf); bpf.connect(gn); ns.start(now);
}

/* ── SFX: WAVE START  (rising ominous siren) ── */
function sndWaveStart(n) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const base = 90 + n * 18;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.5, now);
  g.gain.setValueAtTime(0.5, now + 0.85);
  g.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
  g.connect(masterGain);

  const o = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(base, now);
  o.frequency.linearRampToValueAtTime(base * 2.6, now + 0.7);
  o.frequency.setValueAtTime(base * 1.9, now + 0.7);
  o.connect(g); o.start(now); o.stop(now + 1.3);

  // dissonant fifth
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.2, now + 0.1);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
  g2.connect(masterGain);
  const o2 = audioCtx.createOscillator();
  o2.type = 'square';
  o2.frequency.setValueAtTime(base * 1.5, now + 0.1);
  o2.frequency.linearRampToValueAtTime(base * 3.8, now + 0.7);
  o2.connect(g2); o2.start(now + 0.1); o2.stop(now + 1.3);
}

/* ── SFX: GAME OVER  (descending doom) ── */
function sndGameOver() {
  if (!audioCtx) return;
  const seq = [440, 370, 311, 277, 185, 110];
  seq.forEach((hz, i) => {
    const t = audioCtx.currentTime + i * 0.26;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.55, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    g.connect(masterGain);
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = hz;
    o.connect(g); o.start(t); o.stop(t + 0.5);
  });
}

/* ═══════════════════════════════════════════
   AMBIENT MUSIC  — tense sci-fi lab drone
   5 layers: deep drone, detuned beating,
   filtered noise pulse, eerie high overtone,
   rhythmic heartbeat thud + arpeggio sequencer
   ═══════════════════════════════════════════ */
function startAmbientMusic() {
  if (!audioCtx || musicRunning) return;
  musicRunning = true;

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.20;
  musicGain.connect(masterGain);

  /* Layer 1 — deep sawtooth drone  A1 = 55 Hz */
  const d1 = audioCtx.createOscillator();
  d1.type = 'sawtooth'; d1.frequency.value = 55;
  const dg1 = audioCtx.createGain(); dg1.gain.value = 0.45;
  const lfo1 = audioCtx.createOscillator(); lfo1.frequency.value = 0.25;
  const lg1  = audioCtx.createGain();  lg1.gain.value = 0.18;
  lfo1.connect(lg1); lg1.connect(dg1.gain);
  const lpf1 = audioCtx.createBiquadFilter();
  lpf1.type = 'lowpass'; lpf1.frequency.value = 380;
  d1.connect(lpf1); lpf1.connect(dg1); dg1.connect(musicGain);
  d1.start(); lfo1.start();
  ambientNodes.push(d1, lfo1);

  /* Layer 2 — detuned sine  → slow beating */
  const d2 = audioCtx.createOscillator();
  d2.type = 'sine'; d2.frequency.value = 55.7;
  const dg2 = audioCtx.createGain(); dg2.gain.value = 0.35;
  d2.connect(dg2); dg2.connect(musicGain);
  d2.start(); ambientNodes.push(d2);

  /* Layer 3 — filtered noise pulse  (eerie breathing) */
  const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 6, audioCtx.sampleRate);
  const nData = nBuf.getChannelData(0);
  for (let i = 0; i < nData.length; i++) nData[i] = Math.random() * 2 - 1;
  const nSrc = audioCtx.createBufferSource();
  nSrc.buffer = nBuf; nSrc.loop = true;
  const nFilt = audioCtx.createBiquadFilter();
  nFilt.type = 'bandpass'; nFilt.frequency.value = 180; nFilt.Q.value = 10;
  const nGain = audioCtx.createGain(); nGain.gain.value = 0;
  const pLFO = audioCtx.createOscillator(); pLFO.frequency.value = 0.9;
  const pLFOg = audioCtx.createGain(); pLFOg.gain.value = 0.22;
  pLFO.connect(pLFOg); pLFOg.connect(nGain.gain);
  nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(musicGain);
  nSrc.start(); pLFO.start();
  ambientNodes.push(nSrc, pLFO);

  /* Layer 4 — (удалён: высокий писк 880 Гц) */

  /* Layer 5 — heartbeat thud  (gets faster per wave) */
  function heartbeat() {
    if (!musicRunning) return;
    const playThud = () => {
      const t = audioCtx.currentTime;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.7, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
      g.connect(musicGain);
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(130, t);
      o.frequency.exponentialRampToValueAtTime(28, t + 0.20);
      o.connect(g); o.start(t); o.stop(t + 0.20);
    };
    playThud();
    // Double-thud
    setTimeout(() => { if (musicRunning) playThud(); }, 150);
    const bpm = Math.min(140, 52 + waveNum * 7);
    setTimeout(heartbeat, (60000 / bpm));
  }
  heartbeat();

  /* Sequencer — eerie chromatic arpeggios */
  const eerieScale = [55, 58.27, 61.74, 65.41, 73.42, 77.78, 82.41, 87.31, 110];
  let noteIdx = 0;
  function playSeqNote() {
    if (!musicRunning) return;
    const freq = eerieScale[noteIdx % eerieScale.length];
    noteIdx = (noteIdx + 1 + Math.floor(Math.random() * 3)) % eerieScale.length;
    const t = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.14, t + 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, t + 3.0);
    g.connect(musicGain);
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = freq;
    // slight vibrato
    const vibLFO = audioCtx.createOscillator();
    vibLFO.frequency.value = 5.5;
    const vibG = audioCtx.createGain(); vibG.gain.value = 0.8;
    vibLFO.connect(vibG); vibG.connect(o.frequency);
    vibLFO.start(t); vibLFO.stop(t + 3.0);
    o.connect(g); o.start(t); o.stop(t + 3.0);
    ambientNodes.push(o, vibLFO);

    ambientSeqTimer = setTimeout(playSeqNote, 1200 + Math.random() * 2200);
  }
  ambientSeqTimer = setTimeout(playSeqNote, 1000);
}

function stopAmbientMusic() {
  musicRunning = false;
  clearTimeout(ambientSeqTimer);
  ambientNodes.forEach(n => { try { n.stop(); } catch(e){} });
  ambientNodes = [];
  if (musicGain) { musicGain.disconnect(); musicGain = null; }
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let score=0, hp=3, waveNum=1, gameRunning=false; // ← HP ИГРОКА: hp=3 — стартовое здоровье доктора (сейчас неубиваем, но значение остаётся в HUD)
let microbes=[], bullets=[], particles=[], debris=[];
let lastShot=0, SHOOT_CD=280;
let waveSpawning=false;

// ═══════════════════════════════════════════
//  THREE SETUP
// ═══════════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000d1a, 0.028);

const W=window.innerWidth, H=window.innerHeight;
const camera = new THREE.PerspectiveCamera(72, W/H, 0.05, 80);
camera.position.set(0, 1.65, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x000d1a);
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// ═══════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x112244, 2.5));

const sunLight = new THREE.DirectionalLight(0x88ccff, 1.5);
sunLight.position.set(5, 12, 3);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(512, 512);
scene.add(sunLight);

// Coloured fill lights
const makePointLight = (col, intensity, dist, x, y, z) => {
  const l = new THREE.PointLight(col, intensity, dist);
  l.position.set(x,y,z); scene.add(l); return l;
};
const labLight1 = makePointLight(0x00ffcc, 2.0, 18,  0, 5, 0);
const labLight2 = makePointLight(0x0044ff, 1.2, 14, -8, 3,-8);
const labLight3 = makePointLight(0x00aaff, 1.0, 14,  8, 3, 8);

// ═══════════════════════════════════════════
//  LAB ENVIRONMENT
// ═══════════════════════════════════════════
function buildLab() {
  const R=24;

  // Floor — glossy tiles
  const floorGeo = new THREE.PlaneGeometry(R*2, R*2, 20, 20);
  const floorMat = new THREE.MeshStandardMaterial({
    color:0x0d2233, roughness:0.3, metalness:0.6
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2; floor.receiveShadow=true;
  scene.add(floor);

  // Grid lines
  const grid = new THREE.GridHelper(R*2, 30, 0x003355, 0x001a2a);
  grid.position.y=0.01; scene.add(grid);

  // Ceiling
  const ceilMat = new THREE.MeshStandardMaterial({color:0x08161f,roughness:1});
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(R*2,R*2), ceilMat);
  ceil.rotation.x=Math.PI/2; ceil.position.y=7; scene.add(ceil);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({color:0x0a1e2e,roughness:0.8,metalness:0.1});
  [[0,3.5,-R,0,0,0],[0,3.5,R,0,Math.PI,0],
   [-R,3.5,0,0,Math.PI/2,0],[R,3.5,0,0,-Math.PI/2,0]].forEach(([x,y,z,rx,ry,rz])=>{
    const m=new THREE.Mesh(new THREE.PlaneGeometry(R*2,7),wallMat);
    m.position.set(x,y,z); m.rotation.set(rx,ry,rz); scene.add(m);
  });

  // Ceiling fluorescent lights
  for(let i=-12; i<=12; i+=8) {
    const lg=new THREE.Mesh(
      new THREE.BoxGeometry(5,0.08,0.4),
      new THREE.MeshBasicMaterial({color:0xaaffee})
    );
    lg.position.set(i, 6.9, 0); scene.add(lg);
    const pl=new THREE.PointLight(0x88ffee, 0.7, 12);
    pl.position.set(i, 6.5, 0); scene.add(pl);
  }

  // Lab benches
  const benchPositions = [
    [-10,0,-10],[ 10,0,-10],[-10,0,10],[10,0,10],
    [ 0,0,-14],[ 0,0, 14],[-14,0,0],[14,0,0]
  ];
  benchPositions.forEach(([x,y,z]) => addBench(x,z));

  // Pillars
  [[-16,0,-16],[-16,0,16],[16,0,-16],[16,0,16]].forEach(([x,y,z])=>addPillar(x,z));

  // Неоновая вывеска "Bakhodir" на дальней стене
  addNeonSign();
}

function addBench(x,z) {
  const g=new THREE.Group(); scene.add(g);
  // top
  const top=new THREE.Mesh(
    new THREE.BoxGeometry(3.5,0.1,1.2),
    new THREE.MeshStandardMaterial({color:0x1a4a6a,roughness:0.2,metalness:0.5})
  );
  top.position.set(x,1.1,z); top.castShadow=true; scene.add(top);
  // legs
  const legMat=new THREE.MeshStandardMaterial({color:0x112233,metalness:0.8,roughness:0.3});
  [[-1.6,0,-0.5],[1.6,0,-0.5],[-1.6,0,0.5],[1.6,0,0.5]].forEach(([lx,ly,lz])=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.08,1.1,0.08),legMat);
    leg.position.set(x+lx,0.55,z+lz); scene.add(leg);
  });
  // flasks
  ['#00ff88','#ff3366','#4499ff','#ffcc00'].forEach((col,i)=>{
    if(Math.random()>0.5) return;
    const flask=new THREE.Mesh(
      new THREE.CylinderGeometry(0.07,0.1,0.35,8),
      new THREE.MeshStandardMaterial({
        color:new THREE.Color(col), transparent:true, opacity:0.75,
        roughness:0.1, metalness:0.1
      })
    );
    flask.position.set(x-1+i*0.65,1.28,z); flask.castShadow=true; scene.add(flask);
    // glowing liquid inside
    const glow=new THREE.PointLight(new THREE.Color(col),0.4,1.5);
    glow.position.set(x-1+i*0.65,1.25,z); scene.add(glow);
  });
  // microscope
  if(Math.random()>0.3) {
    const scope=new THREE.Mesh(
      new THREE.BoxGeometry(0.18,0.45,0.18),
      new THREE.MeshStandardMaterial({color:0x223344,metalness:0.7,roughness:0.3})
    );
    scope.position.set(x+0.9,1.35,z); scene.add(scope);
  }
}

function addPillar(x,z) {
  const m=new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.3,7,8),
    new THREE.MeshStandardMaterial({color:0x0c1e2e,metalness:0.5,roughness:0.5})
  );
  m.position.set(x,3.5,z); scene.add(m);
}

//  ВЫВЕСКА "Bakhodir A.A." — стиль HUD игры, одна стена

function addNeonSign() {
  const W = 512, H = 128;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Прозрачный фон
  ctx.clearRect(0, 0, W, H);

  const text = 'Bakhodir A.A.';
  ctx.font = "bold 62px 'Courier New', monospace";
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '2px';

  // Свечение — несколько слоёв как у text-shadow в CSS
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur  = 24;
  ctx.fillStyle   = '#00ffcc';
  for(let i = 0; i < 4; i++) ctx.fillText(text, W/2, H/2);

  // Яркий центр
  ctx.shadowBlur = 6;
  ctx.fillStyle  = '#ccfff8';
  ctx.fillText(text, W/2, H/2);

  const tex = new THREE.CanvasTexture(canvas);
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 1.5),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );

  // Одна стена — северная, по центру, высота ~3.5м
  sign.position.set(0, 3.5, -23.75);
  scene.add(sign);

  // Точечный свет цвета HUD
  const pl = new THREE.PointLight(0x00ffcc, 1.8, 8);
  pl.position.set(0, 3.5, -22.8);
  scene.add(pl);

  // Лёгкое дыхание — как живой экран
  let ph = 0;
  const anim = () => {
    if (!gameRunning) { requestAnimationFrame(anim); return; }
    ph += 0.03;
    pl.intensity = 1.6 + Math.sin(ph * 1.4) * 0.2 + Math.sin(ph * 5.1) * 0.05;
    requestAnimationFrame(anim);
  };
  anim();
}

/* Распределение точек по сфере (Fibonacci lattice) — равномерно */
function fibonacciSphere(N) {
  const pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y   = 1 - (i / (N - 1)) * 2;
    const r   = Math.sqrt(1 - y * y);
    const phi = golden * i;
    pts.push(new THREE.Vector3(r * Math.cos(phi), y, r * Math.sin(phi)));
  }
  return pts;
}

/* ── КОРОНАВИРУС  (серый, шипы с булавовидными окончаниями) ── */
function makeCorona(tier) {
  const g   = new THREE.Group();
  const R   = 0.40 + tier * 0.07;

  // Оболочка — тёмно-серая, металлик (EM-стиль)
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x4a5568, roughness: 0.35, metalness: 0.55,
    emissive: 0x1a2030, emissiveIntensity: 0.4
  });
  g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 14, 14), bodyMat));

  // Белковые шипы — равномерно по всей поверхности
  const N = 22 + tier * 6;
  const shaftMat = new THREE.MeshStandardMaterial({
    color: 0x718096, roughness: 0.4, metalness: 0.4,
    emissive: 0x2d3748, emissiveIntensity: 0.3
  });
  const bulbMat = new THREE.MeshStandardMaterial({
    color: 0xa0aec0, roughness: 0.3, metalness: 0.5,
    emissive: 0x4a5568, emissiveIntensity: 0.5
  });

  fibonacciSphere(N).forEach(dir => {
    const pivot = new THREE.Group();
    pivot.position.copy(dir.clone().multiplyScalar(R));
    pivot.lookAt(dir.clone().multiplyScalar(R * 3));

    // Стержень шипа
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.028, 0.035, 0.28 + tier * 0.04, 6),
      shaftMat
    );
    shaft.position.y = 0.14;
    pivot.add(shaft);

    // Булавовидный наконечник
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.055 + tier * 0.008, 7, 7),
      bulbMat
    );
    bulb.position.y = 0.30;
    pivot.add(bulb);

    g.add(pivot);
  });

  const glowCol = 0x4299e1;
  const pl = new THREE.PointLight(glowCol, 0.6, 2.8);
  g.add(pl);

  g._color = 0x4a5568;
  g._glowCol = glowCol;
  g._tier = tier;
  g._type = 'corona';
  return g;
}

/* ── АДЕНОВИРУС  (икосаэдр + острые фибровые шипы) ── */
function makeAdeno(tier) {
  const g  = new THREE.Group();
  const R  = 0.36 + tier * 0.07;

  // Икосаэдрическая капсида
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x276749, roughness: 0.25, metalness: 0.65,
    emissive: 0x0d2b1a, emissiveIntensity: 0.5
  });
  g.add(new THREE.Mesh(new THREE.IcosahedronGeometry(R, 1), bodyMat));

  // Острые фибровые шипы (меньше, но длиннее)
  const N = 12 + tier * 4;
  const spikeMat = new THREE.MeshStandardMaterial({
    color: 0x48bb78, roughness: 0.3, metalness: 0.5,
    emissive: 0x1a4731, emissiveIntensity: 0.5
  });
  fibonacciSphere(N).forEach(dir => {
    const pivot = new THREE.Group();
    pivot.position.copy(dir.clone().multiplyScalar(R));
    pivot.lookAt(dir.clone().multiplyScalar(R * 3));
    const spike = new THREE.Mesh(
      new THREE.ConeGeometry(0.032, 0.38 + tier * 0.05, 5),
      spikeMat
    );
    spike.position.y = 0.19;
    pivot.add(spike);
    // маленький шарик на вершине (receptor knob)
    const knob = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x9ae6b4, roughness: 0.2, metalness: 0.6 })
    );
    knob.position.y = 0.40;
    pivot.add(knob);
    g.add(pivot);
  });

  const glowCol = 0x38a169;
  g.add(new THREE.PointLight(glowCol, 0.7, 2.5));
  g._color = 0x276749;
  g._glowCol = glowCol;
  g._tier = tier;
  g._type = 'adeno';
  return g;
}

/* ── ПАЛОЧКА КОХА  (Mycobacterium tuberculosis) — красная, удлинённая ── */
function makeKoch(tier) {
  const g = new THREE.Group();

  const len  = 0.95 + tier * 0.12;
  const rad  = 0.16 + tier * 0.02;

  // Цвет — характерный красный (кислотоустойчивое окрашивание по Цилю-Нильсену)
  const rodMat = new THREE.MeshStandardMaterial({
    color: 0xc53030, roughness: 0.45, metalness: 0.25,
    emissive: 0x742a2a, emissiveIntensity: 0.55
  });
  const capMat = new THREE.MeshStandardMaterial({
    color: 0xe53e3e, roughness: 0.4, metalness: 0.3,
    emissive: 0x9b2c2c, emissiveIntensity: 0.4
  });

  // Цилиндрическое тело
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(rad, rad, len, 10),
    rodMat
  );
  g.add(body);

  // Полукруглые торцы (реалистичная форма бациллы)
  [len / 2, -len / 2].forEach(y => {
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(rad, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2),
      capMat
    );
    cap.position.y = y;
    if (y < 0) cap.rotation.x = Math.PI;
    g.add(cap);
  });

  // Поверхностные волнистые выступы (миколовые кислоты — восковая оболочка)
  const waxMat = new THREE.MeshStandardMaterial({
    color: 0xfc8181, roughness: 0.6, metalness: 0.1,
    emissive: 0xc53030, emissiveIntensity: 0.3,
    transparent: true, opacity: 0.75
  });
  for (let i = 0; i < 14 + tier * 3; i++) {
    const bead = new THREE.Mesh(new THREE.SphereGeometry(0.055 + Math.random() * 0.03, 5, 5), waxMat);
    const angle = Math.random() * Math.PI * 2;
    const yPos  = (Math.random() - 0.5) * len * 0.85;
    bead.position.set(Math.cos(angle) * (rad + 0.02), yPos, Math.sin(angle) * (rad + 0.02));
    g.add(bead);
  }

  const glowCol = 0xfc4444;
  const pl = new THREE.PointLight(glowCol, 1.0, 3.0);
  g.add(pl);

  g._color = 0xc53030;
  g._glowCol = glowCol;
  g._tier = tier;
  g._type = 'koch';
  return g;
}

/* ── СПАУН ── */
function spawnMicrobe() {
  const tier = Math.min(Math.floor((waveNum - 1) / 3), 3);

  // Вероятности типов патогенов
  // Только коронавирус и аденовирус
  const rand = Math.random();
  let mesh;
  if (rand < 0.55) {
    mesh = makeCorona(tier);
  } else {
    mesh = makeAdeno(tier);
  }

  const angle = Math.random() * Math.PI * 2;
  const dist  = 14 + Math.random() * 8;
  mesh.position.set(
    camera.position.x + Math.cos(angle) * dist,
    0.6 + Math.random() * 0.5,
    camera.position.z + Math.sin(angle) * dist
  );

  scene.add(mesh);

  microbes.push({
    mesh,
    speed:     0.020 + waveNum * 0.004 + Math.random() * 0.014,
    hp:        1, // ← ЗДОРОВЬЕ МИКРОБОВ: 1 = гибель с 1 выстрела; увеличьте для большей живучести
    color:     mesh._color,
    rotSpeed:  (Math.random() - 0.5) * 0.045,
    bobOffset: Math.random() * Math.PI * 2
  });
}

const bulletMat = new THREE.MeshBasicMaterial({color:0x00ffcc});
const bulletGeo = new THREE.SphereGeometry(0.075, 6, 6);

function shoot() {
  const now=Date.now();
  if(now-lastShot < SHOOT_CD || !gameRunning) return;
  lastShot=now;

  const b = new THREE.Mesh(bulletGeo, bulletMat);
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const startPos = new THREE.Vector3();
  camera.getWorldPosition(startPos);
  b.position.copy(startPos).addScaledVector(dir, 0.4);
  scene.add(b);

  // Bullet glow
  const pl=new THREE.PointLight(0x00ffcc,3,1.5);
  b.add(pl);

  bullets.push({mesh:b, dir:dir.clone(), life:55});

  sndShoot();

  // Recoil
  gunRecoilZ=0.05;

  // Muzzle flash
  const flash=new THREE.PointLight(0xaaffff,8,2);
  flash.position.copy(startPos).addScaledVector(dir,0.3);
  scene.add(flash);
  setTimeout(()=>scene.remove(flash),60);
}

const jZone=document.getElementById('joystick-zone');
const jKnob=document.getElementById('jknob');
const jCenter={x:65,y:65};
let jDelta={x:0,y:0};
let jActive=false, jTouchId=null;

jZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=jZone.getBoundingClientRect();
  jActive=true; jTouchId=t.identifier;
  jCenter.x=r.left+65; jCenter.y=r.top+65;
},{passive:false});
jZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==jTouchId) continue;
    jDelta.x=Math.max(-1,Math.min(1,(t.clientX-jCenter.x)/55));
    jDelta.y=Math.max(-1,Math.min(1,(t.clientY-jCenter.y)/55));
    const len=Math.sqrt(jDelta.x**2+jDelta.y**2);
    if(len>1){jDelta.x/=len;jDelta.y/=len;}
    jKnob.style.left=(39+jDelta.x*36)+'px';
    jKnob.style.top =(39+jDelta.y*36)+'px';
  }
},{passive:false});
const resetJoystick=e=>{
  for(const t of e.changedTouches) if(t.identifier===jTouchId){
    jActive=false; jTouchId=null;
    jDelta={x:0,y:0};
    jKnob.style.left='39px'; jKnob.style.top='39px';
  }
};
jZone.addEventListener('touchend',resetJoystick,{passive:false});
jZone.addEventListener('touchcancel',resetJoystick,{passive:false});

// ── LOOK (right side swipe) ──
let lookTouchId=null, lookLast={x:0,y:0};
let yaw=0, pitch=0;

document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(lookTouchId!==null) continue;
    const rx=t.clientX;
    if(rx>window.innerWidth*0.38 && rx<window.innerWidth-110){
      lookTouchId=t.identifier;
      lookLast={x:t.clientX,y:t.clientY};
    }
  }
},{passive:false});
document.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==lookTouchId) continue;
    yaw  -=(t.clientX-lookLast.x)*0.0028;
    pitch-=(t.clientY-lookLast.y)*0.0028;
    pitch=Math.max(-1.1,Math.min(1.1,pitch));
    lookLast={x:t.clientX,y:t.clientY};
  }
},{passive:false});
document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches) if(t.identifier===lookTouchId) lookTouchId=null;
});
document.addEventListener('touchcancel',e=>{
  for(const t of e.changedTouches) if(t.identifier===lookTouchId) lookTouchId=null;
});

// Fire button
const fireBtn=document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart',e=>{ e.preventDefault(); shoot(); },{passive:false});

// ── POINTER LOCK (desktop 360° mouse look) ──
document.addEventListener('mousemove', e=>{
  if(!gameRunning) return;
  if(document.pointerLockElement === renderer.domElement){
    yaw   -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
    pitch  = Math.max(-1.1, Math.min(1.1, pitch));
  }
});

document.addEventListener('click', ()=>{
  if(!gameRunning) return;
  shoot();
  if(document.pointerLockElement !== renderer.domElement)
    renderer.domElement.requestPointerLock();
});

// WASD + ESC
const keys={};
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape' && gameRunning){ endGame(); return; }
  keys[e.key] = true;
});
document.addEventListener('keyup', e=>{ keys[e.key] = false; });

}
function announceWave(){
  waveAnn.textContent='ВОЛНА '+waveNum;
  waveAnn.style.opacity='1';
  sndWaveStart(waveNum);
  setTimeout(()=>waveAnn.style.opacity='0',1400);
}

// ═══════════════════════════════════════════
//  WAVE SPAWNER
// ═══════════════════════════════════════════
function startWave(){
  if(waveSpawning) return;
  waveSpawning=true;
  announceWave();
  const count=5+waveNum*2; // ← КОЛИЧЕСТВО МИКРОБОВ: 5 = базовое кол-во на 1-й волне; *2 = прирост на каждую волну
  let spawned=0;
  const iv=setInterval(()=>{
    if(!gameRunning){clearInterval(iv); waveSpawning=false; return;}
    spawnMicrobe(); spawned++;
    if(spawned>=count){
      clearInterval(iv);
      waveSpawning=false; // флаг снимаем — волна заспавнена
    }
  },350);
}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
const clock=new THREE.Clock();
let frameN=0;

function tick(){
  requestAnimationFrame(tick);
  if(!gameRunning){ renderer.render(scene,camera); return; }

  const dt=clock.getDelta();
  frameN++;

  // Camera orientation
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  // Player movement
  const spd=5*dt;
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt=new THREE.Vector3( Math.cos(yaw),0,-Math.sin(yaw));
  if(jActive){
    camera.position.addScaledVector(fwd,-jDelta.y*spd);
    camera.position.addScaledVector(rgt, jDelta.x*spd);
  }
  if(keys['w']||keys['ArrowUp'])    camera.position.addScaledVector(fwd,spd);
  if(keys['s']||keys['ArrowDown'])  camera.position.addScaledVector(fwd,-spd);
  if(keys['a']||keys['ArrowLeft'])  camera.position.addScaledVector(rgt,-spd);
  if(keys['d']||keys['ArrowRight']) camera.position.addScaledVector(rgt,spd);
  // clamp to lab
  camera.position.x=Math.max(-20,Math.min(20,camera.position.x));
  camera.position.z=Math.max(-20,Math.min(20,camera.position.z));
  camera.position.y=1.65;

  // Gun sway + recoil
  gunSway+=dt;
  if(gunGroup){
    gunRecoilZ=Math.max(0,gunRecoilZ-dt*0.8);
    gunGroup.position.z=-0.32+gunRecoilZ;
    gunGroup.position.y=-0.14+Math.sin(gunSway*1.8)*0.004;
    gunGroup.rotation.z=Math.sin(gunSway*1.2)*0.008;
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.mesh.position.addScaledVector(b.dir,0.9);
    b.life--;
    if(b.life<=0){ scene.remove(b.mesh); bullets.splice(i,1); continue; }

    // Hit microbes
    let hit=false;
    for(let j=microbes.length-1;j>=0;j--){
      const m=microbes[j];
      if(b.mesh.position.distanceTo(m.mesh.position)<0.75){
        m.hp--;
        sndHit();
        spawnParticles(b.mesh.position, m.color, 8);
        scene.remove(b.mesh); bullets.splice(i,1); hit=true;
        if(m.hp<=0){
          sndKill();
          spawnParticles(m.mesh.position, m.color, 20);
          scene.remove(m.mesh); microbes.splice(j,1);
          score+=10*waveNum*(m.mesh._tier+1);
          updateHUD();
        }
        break;
      }
    }
  }

  // Microbes movement + player collision
  const t=Date.now()*0.001;
  for(let i=microbes.length-1;i>=0;i--){
    const m=microbes[i];
    const dir2=new THREE.Vector3().subVectors(camera.position,m.mesh.position).setY(0).normalize();
    m.mesh.position.addScaledVector(dir2,m.speed);
    m.mesh.position.y=0.55+Math.sin(t*1.8+m.bobOffset)*0.12;
    m.mesh.rotation.y+=m.rotSpeed;
    m.mesh.rotation.x+=m.rotSpeed*0.4;

    const d=m.mesh.position.distanceTo(camera.position);
    if(d<1.3){
      // Доктор неуязвим — только визуальный/звуковой эффект попадания
      sndDamage();
      flashDamage();
      spawnParticles(m.mesh.position,m.color,10);
      scene.remove(m.mesh); microbes.splice(i,1);
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.add(p.vel);
    p.vel.y-=0.007;
    p.life--;
    p.mesh.material.opacity=p.life/40;
    if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); }
  }

  // Next wave check
  if(!waveSpawning && microbes.length===0) {
    // wave finished
  }
  if(microbes.length===0 && !waveSpawning){
    // all dead, next
    setTimeout(()=>{
      if(!gameRunning) return;
      waveNum++; updateHUD(); waveSpawning=false;
      startWave();
    },1200);
    waveSpawning=true; // prevent multiple triggers
  }

  // Animate lab glow
  labLight1.intensity=1.8+Math.sin(t*1.3)*0.4;

  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════
//  GAME CONTROL
// ═══════════════════════════════════════════
function startGame(){
  document.getElementById('start-screen').style.display='none';
  initAudio();
  buildLab();
  createGun();
  gameRunning=true;
  renderer.domElement.requestPointerLock();
  startAmbientMusic();
  startWave();
  clock.start();
  tick();
}
function endGame(){
  gameRunning=false;
  stopAmbientMusic();
  if(document.pointerLockElement) document.exitPointerLock();
  sndGameOver();
  document.getElementById('gameover-screen').style.display='flex';
  document.getElementById('final-score').textContent='СЧЁТ: '+score;
  document.getElementById('final-wave').textContent='ВОЛНА: '+waveNum;
}
function restartGame(){
  // cleanup
  [...microbes].forEach(m=>scene.remove(m.mesh)); microbes=[];
  [...bullets ].forEach(b=>scene.remove(b.mesh)); bullets=[];
  [...particles].forEach(p=>scene.remove(p.mesh)); particles=[];

  score=0; hp=3; waveNum=1; waveSpawning=false;
  camera.position.set(0,1.65,0);
  yaw=0; pitch=0;
  updateHUD();
  document.getElementById('gameover-screen').style.display='none';
  gameRunning=true;
  renderer.domElement.requestPointerLock();
  startAmbientMusic();
  startWave();
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',restartGame);

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
