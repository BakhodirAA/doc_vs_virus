<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🩺 Доктор vs Микробы</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; overflow:hidden; font-family:'Courier New', monospace; touch-action:none; }
  canvas { display:block; cursor:none; }

  /* ── HUD ── */
  #hud { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }

  #score-box {
    position:fixed; top:14px; left:14px;
    background:rgba(0,20,40,0.75); border:1px solid #00ffcc;
    border-radius:8px; padding:6px 14px;
    color:#00ffcc; font-size:16px; font-weight:700;
    text-shadow:0 0 8px #00ffcc;
    letter-spacing:1px;
  }
  #health-box {
    position:fixed; top:14px; right:14px;
    background:rgba(40,0,0,0.75); border:1px solid #ff3355;
    border-radius:8px; padding:6px 14px;
    color:#ff3355; font-size:16px; font-weight:700;
    text-shadow:0 0 8px #ff3355;
  }
  #wave-box {
    position:fixed; top:58px; left:14px;
    color:#ffdd00; font-size:13px; font-weight:700;
    text-shadow:0 0 6px #ffdd00; letter-spacing:2px;
  }
  #author-box {
    position:fixed; top:58px; right:14px;
    color:#00ffcc; font-size:13px; font-weight:700;
    text-shadow:0 0 6px #00ffcc; letter-spacing:2px;
  }
  #ammo-box {
    position:fixed; bottom:160px; right:20px;
    color:#00ccff; font-size:13px; text-align:center;
    text-shadow:0 0 6px #00ccff;
  }

  /* crosshair */
  #crosshair {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:24px; height:24px; pointer-events:none;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.7);
  }
  #crosshair::before { width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
  #crosshair::after  { width:100%; height:2px; top:50%; left:0; transform:translateY(-50%); }

  /* ── JOYSTICK ── */
  #joystick-zone {
    position:fixed; bottom:20px; left:20px;
    width:130px; height:130px; pointer-events:auto;
  }
  #jbase {
    width:130px; height:130px; border-radius:50%;
    background:rgba(0,200,255,0.08);
    border:2px solid rgba(0,200,255,0.3);
  }
  #jknob {
    width:52px; height:52px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,255,220,0.6), rgba(0,150,180,0.3));
    border:2px solid rgba(0,255,220,0.8);
    position:absolute; top:39px; left:39px;
    box-shadow:0 0 12px rgba(0,255,220,0.5);
    transition:none;
  }

  /* ── FIRE BUTTON ── */
  #fire-btn {
    position:fixed; bottom:24px; right:24px;
    width:88px; height:88px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,60,60,0.8), rgba(180,0,0,0.6));
    border:3px solid rgba(255,100,80,0.9);
    box-shadow:0 0 20px rgba(255,0,0,0.4);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700;
    letter-spacing:1px; pointer-events:auto;
    user-select:none;
  }
  #fire-btn span { font-size:24px; line-height:1; }

  /* ── DAMAGE FLASH ── */
  #damage-flash {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(255,0,0,0); pointer-events:none;
    transition:background 0.08s;
  }

  /* ── WAVE ANNOUNCE ── */
  #wave-announce {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#ffdd00; font-size:36px; font-weight:900;
    text-shadow:0 0 20px #ffdd00, 0 0 40px #ff8800;
    letter-spacing:4px; pointer-events:none;
    opacity:0; transition:opacity 0.3s;
    text-align:center;
  }

  /* ── SCREENS ── */
  .fullscreen {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; z-index:100;
  }
  #start-screen {
    background:linear-gradient(160deg, #000d1a 0%, #001a33 50%, #000a14 100%);
  }
  #start-screen h1 {
    font-size:clamp(28px, 8vw, 46px);
    color:#00ffcc; font-weight:900; letter-spacing:4px;
    text-shadow:0 0 20px #00ffcc, 0 0 40px #00aa88;
    margin-bottom:6px;
  }
  #start-screen .subtitle {
    font-size:clamp(12px,4vw,18px); color:#007799;
    letter-spacing:2px; margin-bottom:20px;
  }
  .emoji-row { font-size:52px; margin:10px 0 20px; }
  .hint { font-size:13px; color:#337799; margin:4px 0; letter-spacing:1px; }
  .hint strong { color:#00ccaa; }

  .play-btn {
    margin-top:24px;
    background:linear-gradient(135deg, #00ffcc, #0077ff);
    color:#000; border:none; border-radius:12px;
    padding:14px 44px; font-size:18px; font-weight:900;
    letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 24px rgba(0,255,200,0.4);
    pointer-events:auto;
  }
  .play-btn:active { transform:scale(0.96); }

  #gameover-screen {
    background:rgba(0,0,0,0.92); display:none;
  }
  #gameover-screen h2 {
    font-size:clamp(28px,8vw,48px); color:#ff2244;
    font-weight:900; letter-spacing:3px;
    text-shadow:0 0 20px #ff0000;
    margin-bottom:10px;
  }
  #final-score {
    font-size:clamp(20px,6vw,32px); color:#ffdd00;
    text-shadow:0 0 12px #ffaa00; margin:8px 0 4px;
  }
  #final-wave {
    font-size:16px; color:#7799bb; margin-bottom:20px; letter-spacing:2px;
  }
  .restart-btn {
    background:linear-gradient(135deg, #ff2244, #cc0022);
    color:#fff; border:none; border-radius:12px;
    padding:14px 40px; font-size:16px; font-weight:900;
    letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,0,40,0.4);
    pointer-events:auto; margin-top:10px;
  }
  .restart-btn:active { transform:scale(0.96); }
</style>
</head>
<body>

<!-- START -->
<div id="start-screen" class="fullscreen">
  <h1>🩺 ДОКТОР<br>VS МИКРОБЫ</h1>
  <div class="subtitle">БИОЛАБОРАТОРИЯ / УРОВЕНЬ 1</div>
  <div class="emoji-row">🦠🔬🧫</div>
  <div class="hint"><strong>Джойстик</strong> — движение</div>
  <div class="hint"><strong>Свайп справа</strong> — прицел</div>
  <div class="hint"><strong>ОГОНЬ</strong> — уничтожить патогены</div>
  <div class="hint" style="margin-top:8px"><strong>ПК:</strong> WASD — движение &nbsp;|&nbsp; Мышь — прицел &nbsp;|&nbsp; Click — выстрел &nbsp;|&nbsp; ESC — выход</div>
  <button class="play-btn" id="start-btn">▶ ИГРАТЬ</button>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="fullscreen">
  <h2>☠ ЗАРАЖЕНИЕ</h2>
  <div id="final-score">СЧЁТ: 0</div>
  <div id="final-wave">ВОЛНА: 1</div>
  <button class="restart-btn" id="restart-btn">🔄 СНОВА</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score-box">СЧЁТ: <span id="score-val">0</span></div>
  <div id="health-box">❤️ <span id="hp-val">3</span></div>
  <div id="wave-box">ВОЛНА <span id="wave-val">1</span></div>
  <div id="hatch-hint" style="
    position:fixed; bottom:200px; left:50%; transform:translateX(-50%);
    color:#00ffcc; font-size:12px; font-weight:700;
    font-family:'Courier New',monospace; letter-spacing:1px;
    text-shadow:0 0 8px #00ffcc; pointer-events:none;
    opacity:0; transition:opacity 0.5s;
  ">[ E ] — нажать кнопку люка</div>
  <div id="crosshair"></div>
  <div id="wave-announce" id="wave-announce"></div>
</div>
<div id="damage-flash"></div>

<!-- JOYSTICK -->
<div id="joystick-zone">
  <div id="jbase"></div>
  <div id="jknob"></div>
</div>

<!-- FIRE -->
<div id="fire-btn"><span>💉</span>ОГОНЬ</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API — no files)
// ═══════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let musicGain  = null;
let musicRunning = false;
let ambientNodes = [];
let ambientSeqTimer = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.72;
  masterGain.connect(audioCtx.destination);
}

/* ── noise buffer helper ── */
function noiseBuffer(sec) {
  const sr = audioCtx.sampleRate;
  const n  = Math.ceil(sr * sec);
  const b  = audioCtx.createBuffer(1, n, sr);
  const d  = b.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return b;
}

/* ── SFX: SHOOT  (descending plasma zap) ── */
function sndShoot() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Main zap tone
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.38, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.20);
  g.connect(masterGain);
  const o = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(1600, now);
  o.frequency.exponentialRampToValueAtTime(180, now + 0.18);
  o.connect(g); o.start(now); o.stop(now + 0.20);

  // High crackle
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.15, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
  g2.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer(0.07);
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 4000;
  src.connect(hpf); hpf.connect(g2); src.start(now);
}

/* ── SFX: HIT  (wet splat) ── */
function sndHit() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.28, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
  g.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer(0.13);
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 3;
  src.connect(f); f.connect(g); src.start(now);
}

/* ── SFX: KILL  (pop + gooey drop) ── */
function sndKill() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Noise burst
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.5, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
  gn.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer(0.28);
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.setValueAtTime(4000, now);
  lpf.frequency.exponentialRampToValueAtTime(80, now + 0.28);
  src.connect(lpf); lpf.connect(gn); src.start(now);

  // Descending blop
  const go = audioCtx.createGain();
  go.gain.setValueAtTime(0.22, now);
  go.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
  go.connect(masterGain);
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(520, now);
  o.frequency.exponentialRampToValueAtTime(55, now + 0.22);
  o.connect(go); o.start(now); o.stop(now + 0.22);
}

/* ── SFX: DAMAGE  (harsh alarm buzz) ── */
function sndDamage() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.65, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
  g.connect(masterGain);

  const o = audioCtx.createOscillator();
  o.type = 'square';
  o.frequency.setValueAtTime(240, now);
  o.frequency.setValueAtTime(190, now + 0.12);
  o.frequency.setValueAtTime(240, now + 0.24);
  o.frequency.setValueAtTime(190, now + 0.36);
  o.connect(g); o.start(now); o.stop(now + 0.46);

  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.35, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  gn.connect(masterGain);
  const ns = audioCtx.createBufferSource();
  ns.buffer = noiseBuffer(0.35);
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass'; bpf.frequency.value = 300; bpf.Q.value = 1.5;
  ns.connect(bpf); bpf.connect(gn); ns.start(now);
}

/* ── SFX: WAVE START  (rising ominous siren) ── */
function sndWaveStart(n) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const base = 90 + n * 18;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.5, now);
  g.gain.setValueAtTime(0.5, now + 0.85);
  g.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
  g.connect(masterGain);

  const o = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(base, now);
  o.frequency.linearRampToValueAtTime(base * 2.6, now + 0.7);
  o.frequency.setValueAtTime(base * 1.9, now + 0.7);
  o.connect(g); o.start(now); o.stop(now + 1.3);

  // dissonant fifth
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.2, now + 0.1);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
  g2.connect(masterGain);
  const o2 = audioCtx.createOscillator();
  o2.type = 'square';
  o2.frequency.setValueAtTime(base * 1.5, now + 0.1);
  o2.frequency.linearRampToValueAtTime(base * 3.8, now + 0.7);
  o2.connect(g2); o2.start(now + 0.1); o2.stop(now + 1.3);
}

/* ── SFX: GAME OVER  (descending doom) ── */
function sndGameOver() {
  if (!audioCtx) return;
  const seq = [440, 370, 311, 277, 185, 110];
  seq.forEach((hz, i) => {
    const t = audioCtx.currentTime + i * 0.26;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.55, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    g.connect(masterGain);
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = hz;
    o.connect(g); o.start(t); o.stop(t + 0.5);
  });
}

/* ═══════════════════════════════════════════
   AMBIENT MUSIC  — tense sci-fi lab drone
   5 layers: deep drone, detuned beating,
   filtered noise pulse, eerie high overtone,
   rhythmic heartbeat thud + arpeggio sequencer
   ═══════════════════════════════════════════ */
function startAmbientMusic() {
  if (!audioCtx || musicRunning) return;
  musicRunning = true;

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.20;
  musicGain.connect(masterGain);

  /* Layer 1 — deep sawtooth drone  A1 = 55 Hz */
  const d1 = audioCtx.createOscillator();
  d1.type = 'sawtooth'; d1.frequency.value = 55;
  const dg1 = audioCtx.createGain(); dg1.gain.value = 0.45;
  const lfo1 = audioCtx.createOscillator(); lfo1.frequency.value = 0.25;
  const lg1  = audioCtx.createGain();  lg1.gain.value = 0.18;
  lfo1.connect(lg1); lg1.connect(dg1.gain);
  const lpf1 = audioCtx.createBiquadFilter();
  lpf1.type = 'lowpass'; lpf1.frequency.value = 380;
  d1.connect(lpf1); lpf1.connect(dg1); dg1.connect(musicGain);
  d1.start(); lfo1.start();
  ambientNodes.push(d1, lfo1);

  /* Layer 2 — detuned sine  → slow beating */
  const d2 = audioCtx.createOscillator();
  d2.type = 'sine'; d2.frequency.value = 55.7;
  const dg2 = audioCtx.createGain(); dg2.gain.value = 0.35;
  d2.connect(dg2); dg2.connect(musicGain);
  d2.start(); ambientNodes.push(d2);

  /* Layer 3 — filtered noise pulse  (eerie breathing) */
  const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 6, audioCtx.sampleRate);
  const nData = nBuf.getChannelData(0);
  for (let i = 0; i < nData.length; i++) nData[i] = Math.random() * 2 - 1;
  const nSrc = audioCtx.createBufferSource();
  nSrc.buffer = nBuf; nSrc.loop = true;
  const nFilt = audioCtx.createBiquadFilter();
  nFilt.type = 'bandpass'; nFilt.frequency.value = 180; nFilt.Q.value = 10;
  const nGain = audioCtx.createGain(); nGain.gain.value = 0;
  const pLFO = audioCtx.createOscillator(); pLFO.frequency.value = 0.9;
  const pLFOg = audioCtx.createGain(); pLFOg.gain.value = 0.22;
  pLFO.connect(pLFOg); pLFOg.connect(nGain.gain);
  nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(musicGain);
  nSrc.start(); pLFO.start();
  ambientNodes.push(nSrc, pLFO);

  /* Layer 4 — (удалён: высокий писк 880 Гц) */

  /* Layer 5 — heartbeat thud  (gets faster per wave) */
  function heartbeat() {
    if (!musicRunning) return;
    const playThud = () => {
      const t = audioCtx.currentTime;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.7, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
      g.connect(musicGain);
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(130, t);
      o.frequency.exponentialRampToValueAtTime(28, t + 0.20);
      o.connect(g); o.start(t); o.stop(t + 0.20);
    };
    playThud();
    // Double-thud
    setTimeout(() => { if (musicRunning) playThud(); }, 150);
    const bpm = Math.min(140, 52 + waveNum * 7);
    setTimeout(heartbeat, (60000 / bpm));
  }
  heartbeat();

  /* Sequencer — eerie chromatic arpeggios */
  const eerieScale = [55, 58.27, 61.74, 65.41, 73.42, 77.78, 82.41, 87.31, 110];
  let noteIdx = 0;
  function playSeqNote() {
    if (!musicRunning) return;
    const freq = eerieScale[noteIdx % eerieScale.length];
    noteIdx = (noteIdx + 1 + Math.floor(Math.random() * 3)) % eerieScale.length;
    const t = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.14, t + 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, t + 3.0);
    g.connect(musicGain);
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = freq;
    // slight vibrato
    const vibLFO = audioCtx.createOscillator();
    vibLFO.frequency.value = 5.5;
    const vibG = audioCtx.createGain(); vibG.gain.value = 0.8;
    vibLFO.connect(vibG); vibG.connect(o.frequency);
    vibLFO.start(t); vibLFO.stop(t + 3.0);
    o.connect(g); o.start(t); o.stop(t + 3.0);
    ambientNodes.push(o, vibLFO);

    ambientSeqTimer = setTimeout(playSeqNote, 1200 + Math.random() * 2200);
  }
  ambientSeqTimer = setTimeout(playSeqNote, 1000);
}

function stopAmbientMusic() {
  musicRunning = false;
  clearTimeout(ambientSeqTimer);
  ambientNodes.forEach(n => { try { n.stop(); } catch(e){} });
  ambientNodes = [];
  if (musicGain) { musicGain.disconnect(); musicGain = null; }
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let score=0, hp=3, waveNum=1, gameRunning=false; // ← HP ИГРОКА: hp=3 — стартовое здоровье доктора (сейчас неубиваем, но значение остаётся в HUD)
let microbes=[], bullets=[], particles=[], debris=[];
let lastShot=0, SHOOT_CD=280;
let waveSpawning=false;
let labObjects=[];          // объекты текущей локации — сбрасываются при смене
let stationIntervals=[];    // мигающие интервалы
let labCleanupFns=[];       // аудио-ноды и прочее

// ── ЛЮКОВАЯ СИСТЕМА ──
let hatchMesh=null;         // диск люка
let hatchBtnMesh=null;      // кнопка
let hatchBtnLight=null;     // свет кнопки
let hatchOpen=false;        // открыт ли люк
let hatchSlide=0;           // текущий сдвиг (0=закрыт, 2.2=открыт)
let hatchChanging=false;    // идёт ли анимация

// ═══════════════════════════════════════════
//  THREE SETUP
// ═══════════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000d1a, 0.028);

const W=window.innerWidth, H=window.innerHeight;
const camera = new THREE.PerspectiveCamera(72, W/H, 0.05, 80);
camera.position.set(0, 1.65, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true });

};

function sadd(obj){ scene.add(obj); labObjects.push(obj); return obj; }

function clearLab(){
  labObjects.forEach(o=>scene.remove(o));
  labObjects=[];
  stationIntervals.forEach(id=>clearInterval(id));
  stationIntervals=[];
  labCleanupFns.forEach(fn=>{try{fn();}catch(e){}});
  labCleanupFns=[];
  // Сбросить состояние люка
  hatchMesh=null; hatchBtnMesh=null; hatchBtnLight=null;
  hatchOpen=false; hatchSlide=0; hatchChanging=false;
}

function buildLab() {
  // Тёмная sci-fi лаборатория
  scene.fog = new THREE.FogExp2(0x000d1a, 0.028);
  renderer.setClearColor(0x000d1a);
  labLight1.color.set(0x00ffcc); labLight1.intensity=2.0;
  labLight2.color.set(0x0044ff); labLight2.intensity=1.2;
  labLight3.color.set(0x00aaff); labLight3.intensity=1.0;

  const R=24;

  // Floor — glossy tiles
  const floorGeo = new THREE.PlaneGeometry(R*2, R*2, 20, 20);
  const floorMat = new THREE.MeshStandardMaterial({
    color:0x0d2233, roughness:0.3, metalness:0.6
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2; floor.receiveShadow=true;

  // Grid lines

  // Ceiling

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({color:0x0a1e2e,roughness:0.8,metalness:0.1});
  [[0,3.5,-R,0,0,0],[0,3.5,R,0,Math.PI,0],
   [-R,3.5,0,0,Math.PI/2,0],[R,3.5,0,0,-Math.PI/2,0]].forEach(([x,y,z,rx,ry,rz])=>{
    const m=new THREE.Mesh(new THREE.PlaneGeometry(R*2,7),wallMat);
    m.position.set(x,y,z); m.rotation.set(rx,ry,rz); sadd(m);
  });

  // Ceiling fluorescent lights
  for(let i=-12; i<=12; i+=8) {

      new THREE.BoxGeometry(5,0.08,0.4),

  // Lab benches

    [-10,0,-10],[ 10,0,-10],[-10,0,10],[10,0,10],

  [[-1.6,0,-0.5],[1.6,0,-0.5],[-1.6,0,0.5],[1.6,0,0.5]].forEach(([lx,ly,lz])=>{

//  ВЫВЕСКА "Bakhodir A.A." — стиль HUD игры, одна стена
// ═══════════════════════════════════════════
function addNeonSign() {
  const W = 512, H = 128;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Прозрачный фон
  ctx.clearRect(0, 0, W, H);

  const text = 'Bakhodir A.A.';
  ctx.font = "bold 62px 'Courier New', monospace";
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '2px';

  // Свечение — несколько слоёв как у text-shadow в CSS
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur  = 24;
  ctx.fillStyle   = '#00ffcc';
  for(let i = 0; i < 4; i++) ctx.fillText(text, W/2, H/2);

  // Яркий центр
  ctx.shadowBlur = 6;
  ctx.fillStyle  = '#ccfff8';
  ctx.fillText(text, W/2, H/2);

  const tex = new THREE.CanvasTexture(canvas);
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 1.5),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );

  // Одна стена — северная, по центру, высота ~3.5м
  sign.position.set(0, 3.5, -23.75);
  sadd(sign);

  // Точечный свет цвета HUD
  const pl = new THREE.PointLight(0x00ffcc, 1.8, 8);
  pl.position.set(0, 3.5, -22.8);
  sadd(pl);

  // Лёгкое дыхание — как живой экран
  let ph = 0;
  const anim = () => {
    if (!gameRunning) { requestAnimationFrame(anim); return; }
    ph += 0.03;
    pl.intensity = 1.6 + Math.sin(ph * 1.4) * 0.2 + Math.sin(ph * 5.1) * 0.05;
    requestAnimationFrame(anim);
  };
  anim();
}

// ═══════════════════════════════════════════
//  ЛЮКОВАЯ ДВЕРЬ — на северной стене каждой карты
// ═══════════════════════════════════════════
function addHatch(tint){
  const HATCH_R = 1.4;     // радиус люка
  const WZ = -23.6;        // z стены
  const HY = 2.2;          // высота центра люка

  // ── Тёмное отверстие под люком (иллюзия прохода) ──
  const hole = new THREE.Mesh(
    new THREE.CircleGeometry(HATCH_R, 32),
    new THREE.MeshBasicMaterial({color:0x000000, side:THREE.DoubleSide})
  );
  hole.position.set(0, HY, WZ+0.02); sadd(hole);

  // ── Металлическая рама вокруг отверстия ──
  const rimMat = new THREE.MeshStandardMaterial({
    color:new THREE.Color(tint), metalness:0.9, roughness:0.1,
    emissive:new THREE.Color(tint), emissiveIntensity:0.25
  });
  const rim = new THREE.Mesh(new THREE.TorusGeometry(HATCH_R, 0.1, 16, 48), rimMat);
  rim.position.set(0, HY, WZ+0.05); sadd(rim);

  // Болты по кругу
  const boltMat = new THREE.MeshStandardMaterial({color:0x889999, metalness:0.95, roughness:0.1});
  for(let i=0;i<12;i++){
    const a = i/12*Math.PI*2;
    const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.14,6), boltMat);
    bolt.rotation.z = Math.PI/2;
    bolt.position.set(Math.cos(a)*(HATCH_R+0.02), HY+Math.sin(a)*(HATCH_R+0.02), WZ+0.07);
    sadd(bolt);
  }

  // ── Сам диск люка ("купе" скользит вправо) ──
  // Текстура с надписью Bakhodir A.A.
  const W=512, H=512;
  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  const cx = cv.getContext('2d');

  // Фон диска — тёмный металл с радиальным градиентом
  const grad = cx.createRadialGradient(W/2,H/2,20, W/2,H/2,W/2);
  grad.addColorStop(0,   '#1a2a2a');
  grad.addColorStop(0.6, '#0d1a1a');
  grad.addColorStop(1,   '#050d0d');
  cx.fillStyle = grad; cx.beginPath();
  cx.arc(W/2,H/2,W/2,0,Math.PI*2); cx.fill();

  // Кольцевые насечки (рифление)
  [0.3,0.55,0.78].forEach(r=>{
    cx.strokeStyle='rgba(80,120,120,0.5)'; cx.lineWidth=3;
    cx.beginPath(); cx.arc(W/2,H/2,r*W/2,0,Math.PI*2); cx.stroke();
  });

  // Крестовина
  cx.strokeStyle='rgba(60,100,100,0.6)'; cx.lineWidth=4;
  [0,Math.PI/2].forEach(a=>{
    cx.save(); cx.translate(W/2,H/2); cx.rotate(a);
    cx.beginPath(); cx.moveTo(-W/2,0); cx.lineTo(W/2,0); cx.stroke(); cx.restore();
  });

  // Надпись Bakhodir A.A.
  cx.font="bold 52px 'Courier New',monospace";
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.shadowColor=tint; cx.shadowBlur=20; cx.fillStyle=tint;
  for(let i=0;i<3;i++) cx.fillText('Bakhodir A.A.', W/2, H/2);
  cx.shadowBlur=6; cx.fillStyle='#ffffff'; cx.fillText('Bakhodir A.A.', W/2, H/2);

  const diskMat = new THREE.MeshStandardMaterial({
    map: new THREE.CanvasTexture(cv),
    roughness:0.3, metalness:0.7
  });
  hatchMesh = new THREE.Mesh(new THREE.CircleGeometry(HATCH_R*0.97, 32), diskMat);
  hatchMesh.position.set(0, HY, WZ+0.1);
  sadd(hatchMesh);

  // Световой ореол вокруг рамы
  const hatchGlow = new THREE.PointLight(new THREE.Color(tint), 0.8, 8);
  hatchGlow.position.set(0, HY, WZ+1); sadd(hatchGlow);

  // ── КНОПКА ──
  const btnR = 0.16;
  const btnMat = new THREE.MeshStandardMaterial({
    color:new THREE.Color(tint), emissive:new THREE.Color(tint),
    emissiveIntensity:1.0, roughness:0.2, metalness:0.3
  });
  hatchBtnMesh = new THREE.Mesh(new THREE.CylinderGeometry(btnR,btnR,0.12,16), btnMat);
  hatchBtnMesh.rotation.x = Math.PI/2;
  hatchBtnMesh.position.set(HATCH_R+0.45, HY, WZ+0.15);
  sadd(hatchBtnMesh);

  // Основание кнопки
  const btnBase = new THREE.Mesh(
    new THREE.BoxGeometry(0.55,0.55,0.08),
    new THREE.MeshStandardMaterial({color:0x1a2a2a, metalness:0.8, roughness:0.2})
  );
  btnBase.position.set(HATCH_R+0.45, HY, WZ+0.08); sadd(btnBase);

  hatchBtnLight = new THREE.PointLight(new THREE.Color(tint), 1.2, 3);
  hatchBtnLight.position.set(HATCH_R+0.45, HY, WZ+0.5); sadd(hatchBtnLight);

  // ── Надпись OPEN/CLOSE над кнопкой ──
  const lblW=256, lblH=64;
  const lblCv=document.createElement('canvas'); lblCv.width=lblW; lblCv.height=lblH;
  const lblCx=lblCv.getContext('2d');
  lblCx.clearRect(0,0,lblW,lblH);
  lblCx.font="bold 28px 'Courier New',monospace";
  lblCx.textAlign='center'; lblCx.textBaseline='middle';
  lblCx.shadowColor=tint; lblCx.shadowBlur=10; lblCx.fillStyle=tint;
  lblCx.fillText('[ OPEN ]', lblW/2, lblH/2);
  const lblMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.9, 0.22),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(lblCv), transparent:true})
  );
  lblMesh.position.set(HATCH_R+0.45, HY+0.45, WZ+0.15); sadd(lblMesh);

  // ── Пульсация кнопки ──
  let bph=0;
  const ba=()=>{
    if(!gameRunning){requestAnimationFrame(ba);return;}
    bph+=0.05;
    if(hatchBtnLight) hatchBtnLight.intensity = hatchOpen
      ? 0.6+Math.sin(bph*8)*0.3       // быстрее мигает когда открыт
      : 0.9+Math.sin(bph*2)*0.3;
    requestAnimationFrame(ba);
  };
  ba();

  // ── Клик/тап по кнопке ──
  // Детектируем через raycaster в shoot и в click
  hatchBtnMesh.userData.isHatchBtn = true;
  hatchBtnMesh.userData.tint = tint;

  // Звук открытия (механический клик + шипение)
  function sndHatch(){
    if(!audioCtx) return;
    const now=audioCtx.currentTime;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.4,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    g.connect(masterGain);
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.35,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=600;
    src.connect(lpf); lpf.connect(g); src.start(now);
    // клик
    const gk=audioCtx.createGain(); gk.gain.setValueAtTime(0.6,now); gk.gain.exponentialRampToValueAtTime(0.001,now+0.08);
    gk.connect(masterGain);
    const ok=audioCtx.createOscillator(); ok.type='square'; ok.frequency.value=180;
    ok.connect(gk); ok.start(now); ok.stop(now+0.08);
  }

  hatchBtnMesh.userData.onPress = ()=>{
    hatchOpen=!hatchOpen;
    sndHatch();
    // Цвет кнопки: бирюза = открыть, красный = закрыть
    const newCol = hatchOpen ? 0xff2200 : new THREE.Color(tint);
    hatchBtnMesh.material.color.set(newCol);
    hatchBtnMesh.material.emissive.set(newCol);
    hatchBtnLight.color.set(newCol);
  };
}

// ── Проверка нажатия на кнопку люка (вызывается при click/tap) ──
function checkHatchButton(event){
  if(!hatchBtnMesh) return;
  const raycaster=new THREE.Raycaster();
  // Для мыши/тач используем нормализованные координаты
  let nx, ny;
  if(event.touches){
    nx=(event.touches[0].clientX/window.innerWidth)*2-1;
    ny=-(event.touches[0].clientY/window.innerHeight)*2+1;
  } else {
    nx=(event.clientX/window.innerWidth)*2-1;
    ny=-(event.clientY/window.innerHeight)*2+1;
  }
  raycaster.setFromCamera(new THREE.Vector2(nx,ny), camera);
  const hits=raycaster.intersectObject(hatchBtnMesh);
  if(hits.length>0) hatchBtnMesh.userData.onPress();
}

// ── Нажатие кнопки люка клавиатурой E (proximity) ──
function tryPressHatch(){
  if(!hatchBtnMesh) return;
  const d=camera.position.distanceTo(hatchBtnMesh.position);
  if(d<3.5) hatchBtnMesh.userData.onPress();
}

// ── базовая комната: пол/потолок/стены ──
function baseRoom(fCol,wCol,cCol,fogCol,fogD,l1c,l2c,l3c){
  scene.fog=new THREE.FogExp2(fogCol,fogD);
  renderer.setClearColor(fogCol);
  labLight1.color.set(l1c); labLight1.intensity=2.0;
  labLight2.color.set(l2c); labLight2.intensity=1.2;
  labLight3.color.set(l3c); labLight3.intensity=1.0;
  const R=24;
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(R*2,R*2),
    new THREE.MeshStandardMaterial({color:fCol,roughness:0.4,metalness:0.3}));
  fl.rotation.x=-Math.PI/2; sadd(fl);
  const ce=new THREE.Mesh(new THREE.PlaneGeometry(R*2,R*2),
    new THREE.MeshStandardMaterial({color:cCol,roughness:0.9}));
  ce.rotation.x=Math.PI/2; ce.position.y=7; sadd(ce);
  [[0,3.5,-R,0],[0,3.5,R,Math.PI],[-R,3.5,0,Math.PI/2],[R,3.5,0,-Math.PI/2]].forEach(([x,y,z,ry])=>{
    const w=new THREE.Mesh(new THREE.PlaneGeometry(R*2,7),
      new THREE.MeshStandardMaterial({color:wCol,roughness:0.8,metalness:0.05}));
    w.position.set(x,y,z); w.rotation.y=ry; sadd(w);
  });
}

           0xffffff,0xe0eeff,0xfff0ee);

  grid.position.y=0.01; sadd(grid);
  // Лампы
  for(let i=-12;i<=12;i+=8){
    const t=new THREE.Mesh(new THREE.BoxGeometry(5,0.06,0.3),
      new THREE.MeshBasicMaterial({color:0xf8ffff}));
    t.position.set(i,6.9,0); sadd(t);
    const pl=new THREE.PointLight(0xeef8ff,1.0,16);
    pl.position.set(i,6.5,0); sadd(pl);
  }
  // Кровати
  const bedMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.9});
  const frmMat=new THREE.MeshStandardMaterial({color:0xaabbcc,metalness:0.8,roughness:0.2});
  [[-10,-10],[10,-10],[-10,10],[10,10],[0,-16],[0,16]].forEach(([bx,bz])=>{
    const fr=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.6,1.1),frmMat);
    fr.position.set(bx,0.3,bz); sadd(fr);
    const mt=new THREE.Mesh(new THREE.BoxGeometry(2.1,0.22,1.0),bedMat);
    mt.position.set(bx,0.65,bz); sadd(mt);
    const pl=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.12,0.9),bedMat);
    pl.position.set(bx-0.72,0.78,bz); sadd(pl);
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,1.8,6),frmMat);
    pole.position.set(bx+1.0,0.9,bz); sadd(pole);
    const bag=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.3,0.08),
      new THREE.MeshStandardMaterial({color:0xcceecc,transparent:true,opacity:0.7}));
    bag.position.set(bx+1.0,1.85,bz); sadd(bag);
  });
  // Мониторы
  const monMat=new THREE.MeshStandardMaterial({color:0x112233,metalness:0.7,roughness:0.3});
  [-14,0,14].forEach(mx=>{
    const mon=new THREE.Mesh(new THREE.BoxGeometry(1.8,1.1,0.12),monMat);
    mon.position.set(mx,4.5,-R+0.1); sadd(mon);
    const scr=new THREE.Mesh(new THREE.PlaneGeometry(1.6,0.9),
      new THREE.MeshBasicMaterial({color:0x001a33}));
    scr.position.set(mx,4.5,-R+0.15); sadd(scr);
    const gl=new THREE.PointLight(0x0055aa,0.4,4);
    gl.position.set(mx,4.5,-R+0.5); sadd(gl);
  });
  addHatch('#00ffcc');
}

function buildSubmarine(){
  baseRoom(0x080f18,0x0a1520,0x060e16,0x020810,0.022,
           0x0088ff,0x004488,0x00ccff);
  const R=24;

// ═══════════════════════════════════════════
//  КОСМИЧЕСКАЯ СТАНЦИЯ — волна 3
// ═══════════════════════════════════════════
function buildStation() {
  scene.fog = new THREE.FogExp2(0x000005, 0.018);
  renderer.setClearColor(0x000008);

  // Тревожное красное + холодный синий
  labLight1.color.set(0xff2200); labLight1.intensity = 1.4;
  labLight2.color.set(0x0033ff); labLight2.intensity = 0.8;
  labLight3.color.set(0xff4400); labLight3.intensity = 0.9;

  const R = 24;

  // ── ПОЛ — рифлёный металл с решёткой ──
  const floorMat = new THREE.MeshStandardMaterial({color:0x111418, roughness:0.55, metalness:0.85});
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(R*2, R*2), floorMat);
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; sadd(floor);

  // Металлическая решётка поверх пола
  const grid = new THREE.GridHelper(R*2, 24, 0x223344, 0x1a2833);
  grid.position.y = 0.01; sadd(grid);

  // Предупреждающие полосы (жёлто-чёрные) по краям пола
  const stripeMat = new THREE.MeshStandardMaterial({color:0xffaa00, roughness:0.8, metalness:0.1});
  const darkMat   = new THREE.MeshStandardMaterial({color:0x111111, roughness:0.9, metalness:0.1});
  for(let i=-22; i<=22; i+=2.4){
    const stripe = new THREE.Mesh(new THREE.PlaneGeometry(1.1, 0.9), (Math.floor(i)%2===0 ? stripeMat : darkMat));
    stripe.rotation.x = -Math.PI/2; stripe.position.set(i, 0.005, -R+0.45); sadd(stripe);
    const stripe2 = stripe.clone(); stripe2.position.set(i, 0.005, R-0.45); sadd(stripe2);
    const stripe3 = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 1.1), (Math.floor(i)%2===0 ? stripeMat : darkMat));
    stripe3.rotation.x = -Math.PI/2; stripe3.position.set(-R+0.45, 0.005, i); sadd(stripe3);
    const stripe4 = stripe3.clone(); stripe4.position.set(R-0.45, 0.005, i); sadd(stripe4);
  }

  // ── ПОТОЛОК — панели с трубами ──
  const ceilMat = new THREE.MeshStandardMaterial({color:0x0d1117, roughness:0.8, metalness:0.6});
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(R*2, R*2), ceilMat);
  ceil.rotation.x = Math.PI/2; ceil.position.y = 7; sadd(ceil);

  // Трубы на потолке
  const pipeMat = new THREE.MeshStandardMaterial({color:0x2a3a4a, metalness:0.9, roughness:0.2});
  for(let z=-16; z<=16; z+=8){
    const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, R*2, 8), pipeMat);
    pipe.rotation.z = Math.PI/2; pipe.position.set(0, 6.7, z); sadd(pipe);
  }
  // Поперечные трубы
  for(let x=-16; x<=16; x+=16){
    const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, R*2, 8), pipeMat);
    pipe.rotation.x = Math.PI/2; pipe.position.set(x, 6.5, 0); sadd(pipe);
  }

  // ── СТЕНЫ — металлические панели с гексагональным рифлением ──
  const wallMat = new THREE.MeshStandardMaterial({color:0x0e1520, roughness:0.6, metalness:0.7});
  const panelMat = new THREE.MeshStandardMaterial({color:0x1a2535, roughness:0.5, metalness:0.8});
  const rimMat   = new THREE.MeshStandardMaterial({color:0x2a3d52, metalness:0.95, roughness:0.1});

  [[0,3.5,-R,0,0],[0,3.5,R,Math.PI,0],
   [-R,3.5,0,Math.PI/2,0],[R,3.5,0,-Math.PI/2,0]].forEach(([x,y,z,ry])=>{
    const w = new THREE.Mesh(new THREE.PlaneGeometry(R*2,7), wallMat);
    w.position.set(x,y,z); w.rotation.y=ry; sadd(w);

    // Металлические панели (3 ряда по стене)
    for(let pi=-3; pi<=3; pi++){
      const panel = new THREE.Mesh(new THREE.BoxGeometry(7.5,1.8,0.08), panelMat);
      const rim   = new THREE.Mesh(new THREE.BoxGeometry(7.6,1.9,0.04), rimMat);
      const offset = new THREE.Vector3(pi*7.8, y-1.2+((Math.abs(pi)%2)*1.9), z);
      // rotate panels for each wall
      const g = new THREE.Group();
      g.position.set(x,y,z); g.rotation.y=ry;
      panel.position.set(pi*7.8-x*0*(ry===0?1:0), -1.2+((Math.abs(pi)%2)*1.9), 0.05);
      rim.position.copy(panel.position); rim.position.z=0.02;
      g.add(panel); g.add(rim);
      sadd(g);
    }
  });

  // ── ИЛЛЮМИНАТОРЫ со звёздным небом ──
  const portholeMat = new THREE.MeshBasicMaterial({color:0x000010});
  const glassColor  = new THREE.MeshStandardMaterial({color:0x112244, transparent:true, opacity:0.55, roughness:0, metalness:0.1});
  const rimPortMat  = new THREE.MeshStandardMaterial({color:0x445566, metalness:0.95, roughness:0.1});

  // 4 иллюминатора на каждой стене
  [[0,-R,0],[0,R,Math.PI],[-R,0,Math.PI/2],[R,0,-Math.PI/2]].forEach(([wx,wz,wy])=>{
    [-10,-3,3,10].forEach(offset=>{
      // Внешняя рама
      const rim = new THREE.Mesh(new THREE.RingGeometry(0.72, 0.88, 20), rimPortMat);
      rim.position.set(wx + (Math.abs(wy)===Math.PI/2?0:offset), 3.4, wz + (Math.abs(wy)===Math.PI/2?offset:0));
      rim.rotation.y = wy; sadd(rim);
      // Стекло (тёмно-синее)
      const glass = new THREE.Mesh(new THREE.CircleGeometry(0.7, 20), glassColor);
      glass.position.copy(rim.position); glass.rotation.y = wy; sadd(glass);
      // Звёздное поле за иллюминатором (точки)
      const starsGeo = new THREE.BufferGeometry();
      const starPos = [];
      for(let s=0; s<60; s++){
        const a = Math.random()*Math.PI*2, r = Math.random()*0.6;
        starPos.push(Math.cos(a)*r, Math.sin(a)*r, 0);
      }
      starsGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos),3));
      const starsMat = new THREE.PointsMaterial({color:0xffffff, size:0.03});
      const stars = new THREE.Points(starsGeo, starsMat);
      stars.position.copy(rim.position);
      // сдвинуть чуть глубже в стену
      stars.position.x += (Math.sin(wy))*0.01;
      stars.position.z += (Math.cos(wy))*0.01;
      stars.rotation.y = wy; sadd(stars);
      // Голубоватый отблеск от иллюминатора
      const glow = new THREE.PointLight(0x2244aa, 0.5, 5);
      glow.position.set(
        wx + (Math.abs(wy)===Math.PI/2?1.5*Math.sign(wx):offset),
        3.4,
        wz + (Math.abs(wy)===Math.PI/2?offset:1.5*Math.sign(wz))
      );
      sadd(glow);
    });
  });

  // ── АВАРИЙНОЕ ОСВЕЩЕНИЕ — красные лампы по углам ──
  const alarmMat = new THREE.MeshBasicMaterial({color:0xff1100});

/* Распределение точек по сфере (Fibonacci lattice) — равномерно */
function fibonacciSphere(N) {
  const pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y   = 1 - (i / (N - 1)) * 2;
    const r   = Math.sqrt(1 - y * y);
    const phi = golden * i;
    pts.push(new THREE.Vector3(r * Math.cos(phi), y, r * Math.sin(phi)));
  }
  return pts;
}

/* ── КОРОНАВИРУС  (серый, шипы с булавовидными окончаниями) ── */
function makeCorona(tier) {
  const g   = new THREE.Group();
  const R   = 0.40 + tier * 0.07;

  // Оболочка — тёмно-серая, металлик (EM-стиль)
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x4a5568, roughness: 0.35, metalness: 0.55,
    emissive: 0x1a2030, emissiveIntensity: 0.4
  });
  g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 14, 14), bodyMat));

  // Белковые шипы — равномерно по всей поверхности
  const N = 22 + tier * 6;
  const shaftMat = new THREE.MeshStandardMaterial({
    color: 0x718096, roughness: 0.4, metalness: 0.4,
    emissive: 0x2d3748, emissiveIntensity: 0.3
  });
  const bulbMat = new THREE.MeshStandardMaterial({
    color: 0xa0aec0, roughness: 0.3, metalness: 0.5,
    emissive: 0x4a5568, emissiveIntensity: 0.5
  });

  fibonacciSphere(N).forEach(dir => {
    const pivot = new THREE.Group();
    pivot.position.copy(dir.clone().multiplyScalar(R));
    pivot.lookAt(dir.clone().multiplyScalar(R * 3));

    // Стержень шипа
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.028, 0.035, 0.28 + tier * 0.04, 6),
      shaftMat
    );
    shaft.position.y = 0.14;
    pivot.add(shaft);

    // Булавовидный наконечник
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.055 + tier * 0.008, 7, 7),
      bulbMat
    );
    bulb.position.y = 0.30;
    pivot.add(bulb);

    g.add(pivot);
  });

  const glowCol = 0x4299e1;
  const pl = new THREE.PointLight(glowCol, 0.6, 2.8);
  g.add(pl);

  g._color = 0x4a5568;
  g._glowCol = glowCol;
  g._tier = tier;
  g._type = 'corona';
  return g;
}

/* ── АДЕНОВИРУС  (икосаэдр + острые фибровые шипы) ── */
function makeAdeno(tier) {
  const g  = new THREE.Group();
  const R  = 0.36 + tier * 0.07;

  // Икосаэдрическая капсида
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x276749, roughness: 0.25, metalness: 0.65,
    emissive: 0x0d2b1a, emissiveIntensity: 0.5
  });
  g.add(new THREE.Mesh(new THREE.IcosahedronGeometry(R, 1), bodyMat));

  // Острые фибровые шипы (меньше, но длиннее)
  const N = 12 + tier * 4;
  const spikeMat = new THREE.MeshStandardMaterial({
    color: 0x48bb78, roughness: 0.3, metalness: 0.5,
    emissive: 0x1a4731, emissiveIntensity: 0.5
  });
  fibonacciSphere(N).forEach(dir => {
    const pivot = new THREE.Group();
    pivot.position.copy(dir.clone().multiplyScalar(R));
    pivot.lookAt(dir.clone().multiplyScalar(R * 3));
    const spike = new THREE.Mesh(
      new THREE.ConeGeometry(0.032, 0.38 + tier * 0.05, 5),
      spikeMat
    );
    spike.position.y = 0.19;
    pivot.add(spike);
    // маленький шарик на вершине (receptor knob)
    const knob = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x9ae6b4, roughness: 0.2, metalness: 0.6 })
    );
    knob.position.y = 0.40;
    pivot.add(knob);
    g.add(pivot);
  });

  const glowCol = 0x38a169;
  g.add(new THREE.PointLight(glowCol, 0.7, 2.5));
  g._color = 0x276749;
  g._glowCol = glowCol;
  g._tier = tier;
  g._type = 'adeno';
  return g;
}

/* ── ПАЛОЧКА КОХА  (Mycobacterium tuberculosis) — красная, удлинённая ── */
function makeKoch(tier) {
  const g = new THREE.Group();

  const len  = 0.95 + tier * 0.12;
  const rad  = 0.16 + tier * 0.02;

  // Цвет — характерный красный (кислотоустойчивое окрашивание по Цилю-Нильсену)
  const rodMat = new THREE.MeshStandardMaterial({
    color: 0xc53030, roughness: 0.45, metalness: 0.25,
    emissive: 0x742a2a, emissiveIntensity: 0.55
  });
  const capMat = new THREE.MeshStandardMaterial({
    color: 0xe53e3e, roughness: 0.4, metalness: 0.3,
    emissive: 0x9b2c2c, emissiveIntensity: 0.4
  });

  // Цилиндрическое тело
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(rad, rad, len, 10),
    rodMat
  );
  g.add(body);

  // Полукруглые торцы (реалистичная форма бациллы)
  [len / 2, -len / 2].forEach(y => {
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(rad, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2),
      capMat
    );
    cap.position.y = y;
    if (y < 0) cap.rotation.x = Math.PI;
    g.add(cap);
  });

  // Поверхностные волнистые выступы (миколовые кислоты — восковая оболочка)
  const waxMat = new THREE.MeshStandardMaterial({
    color: 0xfc8181, roughness: 0.6, metalness: 0.1,
    emissive: 0xc53030, emissiveIntensity: 0.3,
    transparent: true, opacity: 0.75
  });
  for (let i = 0; i < 14 + tier * 3; i++) {
    const bead = new THREE.Mesh(new THREE.SphereGeometry(0.055 + Math.random() * 0.03, 5, 5), waxMat);
    const angle = Math.random() * Math.PI * 2;
    const yPos  = (Math.random() - 0.5) * len * 0.85;
    bead.position.set(Math.cos(angle) * (rad + 0.02), yPos, Math.sin(angle) * (rad + 0.02));
    g.add(bead);
  }

  const glowCol = 0xfc4444;
  const pl = new THREE.PointLight(glowCol, 1.0, 3.0);
  g.add(pl);

  g._color = 0xc53030;
  g._glowCol = glowCol;
  g._tier = tier;
  g._type = 'koch';
  return g;
}

/* ── СПАУН ── */
function spawnMicrobe() {
  const tier = Math.min(Math.floor((waveNum - 1) / 3), 3);

  // Вероятности типов патогенов
  // Только коронавирус и аденовирус
  const rand = Math.random();
  let mesh;
  if (rand < 0.55) {
    mesh = makeCorona(tier);
  } else {
    mesh = makeAdeno(tier);
  }

  const angle = Math.random() * Math.PI * 2;
  const dist  = 14 + Math.random() * 8;
  mesh.position.set(
    camera.position.x + Math.cos(angle) * dist,
    0.6 + Math.random() * 0.5,
    camera.position.z + Math.sin(angle) * dist
  );

  scene.add(mesh);

  microbes.push({
    mesh,
    speed:     0.020 + waveNum * 0.004 + Math.random() * 0.014,
    hp:        1, // ← ЗДОРОВЬЕ МИКРОБОВ: 1 = гибель с 1 выстрела; увеличьте для большей живучести
    color:     mesh._color,
    rotSpeed:  (Math.random() - 0.5) * 0.045,

  });
}

const jZone=document.getElementById('joystick-zone');
const jKnob=document.getElementById('jknob');
const jCenter={x:65,y:65};
let jDelta={x:0,y:0};
let jActive=false, jTouchId=null;

jZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=jZone.getBoundingClientRect();
  jActive=true; jTouchId=t.identifier;
  jCenter.x=r.left+65; jCenter.y=r.top+65;
},{passive:false});
jZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==jTouchId) continue;
    jDelta.x=Math.max(-1,Math.min(1,(t.clientX-jCenter.x)/55));
    jDelta.y=Math.max(-1,Math.min(1,(t.clientY-jCenter.y)/55));
    const len=Math.sqrt(jDelta.x**2+jDelta.y**2);
    if(len>1){jDelta.x/=len;jDelta.y/=len;}
    jKnob.style.left=(39+jDelta.x*36)+'px';
    jKnob.style.top =(39+jDelta.y*36)+'px';
  }
},{passive:false});
const resetJoystick=e=>{
  for(const t of e.changedTouches) if(t.identifier===jTouchId){
    jActive=false; jTouchId=null;
    jDelta={x:0,y:0};
    jKnob.style.left='39px'; jKnob.style.top='39px';
  }
};
jZone.addEventListener('touchend',resetJoystick,{passive:false});
jZone.addEventListener('touchcancel',resetJoystick,{passive:false});

// ── LOOK (swipe anywhere except joystick and fire button) ──
let lookTouchId=null, lookLast={x:0,y:0};
let yaw=0, pitch=0;

// Джойстик занимает левый нижний угол ~150x150px
// Кнопка огня — правый нижний угол ~110px
// Зона прицела = всё остальное (бо́льшая часть экрана)
function isLookZone(x, y) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const inJoystick  = x < 160 && y > H - 160;   // левый нижний угол
  const inFireBtn   = x > W - 120 && y > H - 120; // правый нижний угол
  return !inJoystick && !inFireBtn;
}

document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(lookTouchId!==null) continue;
    if(isLookZone(t.clientX, t.clientY)){
      lookTouchId=t.identifier;
      lookLast={x:t.clientX,y:t.clientY};
    }
  }
},{passive:false});
document.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==lookTouchId) continue;
    yaw  -=(t.clientX-lookLast.x)*0.003;
    pitch-=(t.clientY-lookLast.y)*0.003;
    pitch=Math.max(-1.1,Math.min(1.1,pitch));
    lookLast={x:t.clientX,y:t.clientY};
  }
},{passive:false});
document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches) if(t.identifier===lookTouchId) lookTouchId=null;
});
document.addEventListener('touchcancel',e=>{
  for(const t of e.changedTouches) if(t.identifier===lookTouchId) lookTouchId=null;
});

// Fire button
const fireBtn=document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart',e=>{ e.preventDefault(); shoot(); },{passive:false});

// ── POINTER LOCK (desktop 360° mouse look) ──
document.addEventListener('mousemove', e=>{
  if(!gameRunning) return;
  if(document.pointerLockElement === renderer.domElement){
    yaw   -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
    pitch  = Math.max(-1.1, Math.min(1.1, pitch));
  }
});

document.addEventListener('click', e=>{
  if(!gameRunning) return;
  const inFS = !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
  if(!inFS) { enterFullscreen(); return; }
  // Сначала проверяем нажатие кнопки люка
  if(hatchBtnMesh && document.pointerLockElement !== renderer.domElement){
    checkHatchButton(e);
  }
  shoot();
  if(document.pointerLockElement !== renderer.domElement && !('ontouchstart' in window))
    renderer.domElement.requestPointerLock();
});

// WASD + Space + ESC + E (кнопка люка)
const keys={};
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape' && gameRunning){ endGame(); return; }
  if((e.key === ' ' || e.key === 'Spacebar') && gameRunning){ e.preventDefault(); shoot(); return; }
  if((e.key === 'e' || e.key === 'E') && gameRunning){ tryPressHatch(); return; }
  if(['w','a','s','d','W','A','S','D'].includes(e.key) && gameRunning
      && document.pointerLockElement !== renderer.domElement) {
    renderer.domElement.requestPointerLock();
  }
  keys[e.key] = true;
});
document.addEventListener('keyup', e=>{ keys[e.key] = false; });

// ═══════════════════════════════════════════
//  HUD HELPERS
// ═══════════════════════════════════════════
const scoreVal=document.getElementById('score-val');
const hpVal   =document.getElementById('hp-val');
const waveVal =document.getElementById('wave-val');
const waveAnn =document.getElementById('wave-announce');
const dmgFlash=document.getElementById('damage-flash');

function updateHUD(){
  scoreVal.textContent=score;
  hpVal.textContent=hp;
  waveVal.textContent=waveNum;
}
function flashDamage(){
  dmgFlash.style.background='rgba(255,0,0,0.45)';
  setTimeout(()=>dmgFlash.style.background='rgba(255,0,0,0)',200);
}
function announceWave(){
  waveAnn.textContent='ВОЛНА '+waveNum;
  waveAnn.style.opacity='1';
  sndWaveStart(waveNum);
  setTimeout(()=>waveAnn.style.opacity='0',1400);
}

// ═══════════════════════════════════════════
//  WAVE SPAWNER
// ═══════════════════════════════════════════
function startWave(){
  if(waveSpawning) return;
  waveSpawning=true;
  announceWave();
  const count=5+waveNum*2; // ← КОЛИЧЕСТВО МИКРОБОВ
  let spawned=0;
  const iv=setInterval(()=>{
    if(!gameRunning){clearInterval(iv); waveSpawning=false; return;}
    spawnMicrobe(); spawned++;
    if(spawned>=count){clearInterval(iv); waveSpawning=false;}
  },350);
}

// Периодически доспавниваем врагов чтобы комната не пустела
function keepAlive(){
  if(!gameRunning) return;
  if(microbes.length<3 && !waveSpawning){
    for(let i=0;i<3;i++) spawnMicrobe();
  }
  setTimeout(keepAlive, 5000);
}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
const clock=new THREE.Clock();
let frameN=0;

function tick(){
  requestAnimationFrame(tick);
  if(!gameRunning){ renderer.render(scene,camera); return; }

  const dt=clock.getDelta();
  frameN++;

  // Camera orientation
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  // Player movement
  const spd=5*dt;
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt=new THREE.Vector3( Math.cos(yaw),0,-Math.sin(yaw));
  if(jActive){
    camera.position.addScaledVector(fwd,-jDelta.y*spd);
    camera.position.addScaledVector(rgt, jDelta.x*spd);
  }
  if(keys['w']||keys['ArrowUp'])    camera.position.addScaledVector(fwd,spd);
  if(keys['s']||keys['ArrowDown'])  camera.position.addScaledVector(fwd,-spd);
  if(keys['a']||keys['ArrowLeft'])  camera.position.addScaledVector(rgt,-spd);
  if(keys['d']||keys['ArrowRight']) camera.position.addScaledVector(rgt,spd);
  // clamp to lab (открыт люк — разрешаем пройти сквозь север)
  camera.position.x=Math.max(-20,Math.min(20,camera.position.x));
  camera.position.z=Math.max(hatchOpen?-25:-20,Math.min(20,camera.position.z));
  camera.position.y=1.65;

  // ── Анимация скольжения люка ──
  if(hatchMesh){
    const target = hatchOpen ? 2.2 : 0;
    hatchSlide += (target - hatchSlide) * 0.12;
    hatchMesh.position.x = hatchSlide;
  }

  // ── Детекция прохода через открытый люк ──
  if(hatchOpen && camera.position.z < -23.4 && !waveSpawning){
    // Игрок прошёл через люк — следующая карта
    camera.position.set(0,1.65,0);
    yaw=0; pitch=0;
    waveNum++; updateHUD();
    clearLab();
    try{ buildMap(waveNum); }catch(e){ console.error('buildMap err',e); }
    renderer.render(scene,camera);
    // Очистить старых врагов и запустить новую волну
    [...microbes].forEach(m=>scene.remove(m.mesh)); microbes=[];
    waveSpawning=false;
    startWave();
  }

  // Gun sway + recoil
  gunSway+=dt;
  if(gunGroup){
    gunRecoilZ=Math.max(0,gunRecoilZ-dt*0.8);
    gunGroup.position.z=-0.32+gunRecoilZ;
    gunGroup.position.y=-0.14+Math.sin(gunSway*1.8)*0.004;
    gunGroup.rotation.z=Math.sin(gunSway*1.2)*0.008;
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.mesh.position.addScaledVector(b.dir,0.9);
    b.life--;
    if(b.life<=0){ scene.remove(b.mesh); bullets.splice(i,1); continue; }

    // Hit microbes
    let hit=false;
    for(let j=microbes.length-1;j>=0;j--){
      const m=microbes[j];
      if(b.mesh.position.distanceTo(m.mesh.position)<0.75){
        m.hp--;
        sndHit();
        spawnParticles(b.mesh.position, m.color, 8);
        scene.remove(b.mesh); bullets.splice(i,1); hit=true;
        if(m.hp<=0){
          sndKill();
          spawnParticles(m.mesh.position, m.color, 20);
          scene.remove(m.mesh); microbes.splice(j,1);
          score+=10*waveNum*(m.mesh._tier+1);
          updateHUD();
        }
        break;
      }
    }
  }

  // Microbes movement + player collision
  const t=Date.now()*0.001;
  for(let i=microbes.length-1;i>=0;i--){
    const m=microbes[i];
    const dir2=new THREE.Vector3().subVectors(camera.position,m.mesh.position).setY(0).normalize();
    m.mesh.position.addScaledVector(dir2,m.speed);
    m.mesh.position.y=0.55+Math.sin(t*1.8+m.bobOffset)*0.12;
    m.mesh.rotation.y+=m.rotSpeed;
    m.mesh.rotation.x+=m.rotSpeed*0.4;

    const d=m.mesh.position.distanceTo(camera.position);
    if(d<1.3){
      // Доктор неуязвим — только визуальный/звуковой эффект попадания
      sndDamage();
      flashDamage();
      spawnParticles(m.mesh.position,m.color,10);
      scene.remove(m.mesh); microbes.splice(i,1);
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.add(p.vel);
    p.vel.y-=0.007;
    p.life--;
    p.mesh.material.opacity=p.life/40;
    if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); }
  }

  // Подсказка: приближение к кнопке люка
  if(hatchBtnMesh){
    const hd=camera.position.distanceTo(hatchBtnMesh.position);
    const hint=document.getElementById('hatch-hint');
    if(hint) hint.style.opacity = hd<4 ? '1' : '0';
  }
  // (враги продолжают спавниться бесконечно пока игрок не уйдёт через люк)

  // Анимация свечения только на 1-й волне
  if(waveNum===1) labLight1.intensity=1.8+Math.sin(t*1.3)*0.4;

  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════
//  FULLSCREEN HELPERS
// ═══════════════════════════════════════════
function enterFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) req.call(el);
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
function exitFullscreen() {
  const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
  if (ex) ex.call(document);
}

// ═══════════════════════════════════════════
//  GAME CONTROL
// ═══════════════════════════════════════════
function startGame(){
  document.getElementById('start-screen').style.display='none';
  initAudio();
  buildLab();
  createGun();
  gameRunning=true;
  enterFullscreen();
  if(!('ontouchstart' in window)) renderer.domElement.requestPointerLock();
  startAmbientMusic();
  startWave();
  keepAlive();
  clock.start();
  tick();
}
function endGame(){
  gameRunning=false;
  stopAmbientMusic();
  if(document.pointerLockElement) document.exitPointerLock();
  exitFullscreen();
  sndGameOver();
  document.getElementById('gameover-screen').style.display='flex';
  document.getElementById('final-score').textContent='СЧЁТ: '+score;
  document.getElementById('final-wave').textContent='ВОЛНА: '+waveNum;
}
function restartGame(){
  [...microbes].forEach(m=>scene.remove(m.mesh)); microbes=[];
  [...bullets ].forEach(b=>scene.remove(b.mesh)); bullets=[];
  [...particles].forEach(p=>scene.remove(p.mesh)); particles=[];

  clearLab();
  score=0; hp=3; waveNum=1; waveSpawning=false;
  camera.position.set(0,1.65,0);
  yaw=0; pitch=0;
  updateHUD();
  document.getElementById('gameover-screen').style.display='none';
  gameRunning=true;
  buildLab();
  enterFullscreen();
  if(!('ontouchstart' in window)) renderer.domElement.requestPointerLock();
  startAmbientMusic();
  startWave();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', restartGame);

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
